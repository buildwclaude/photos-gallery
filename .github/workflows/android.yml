name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # one stable signing key, generated on the first run and committed
      # back so every later APK upgrades cleanly over the previous one
      - name: Ensure signing keystore
        run: |
          if [ ! -f signing/release.jks ]; then
            mkdir -p signing
            keytool -genkeypair -keystore signing/release.jks -alias gallery \
              -storepass gallery-pass -keypass gallery-pass \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Photos Gallery"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add signing/release.jks
            git commit -m "Add release signing keystore [skip ci]"
            git push
          fi

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build release APK
        working-directory: android
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: 1.0.${{ github.run_number }}
        run: gradle assembleRelease

      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Photos-Gallery.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Photos-Gallery
          path: Photos-Gallery.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Photos Gallery v1.0.${{ github.run_number }}
          body: |
            iPhone-style gallery for Android — download `Photos-Gallery.apk` below and install it.

            First install: allow "install unknown apps" for your browser/file manager when prompted.
          files: Photos-Gallery.apk
